<script>
    
    
    
    const canvas = document.getElementById('wind-canvas');
    const ctx = canvas.getContext('2d');
    
    let width = canvas.width = window.innerWidth;
    let height = canvas.height = window.innerHeight;

    
    let mouse = { x: width/2, y: height/2 };
    let trail = [];
const trailLength = 10; 

    
    let sand = [];
    const sandCount = 200;

    window.addEventListener('mousemove', (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
    });

    window.addEventListener('resize', () => {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    });

    
    for(let i=0; i<sandCount; i++) {
        sand.push({
            x: Math.random() * width,
            y: Math.random() * height,
            vx: (Math.random() * 2) + 0.5, 
            vy: (Math.random() * 1) - 0.5,
            size: Math.random() * 2.5
        });
    }

    function animate() {
        
        ctx.clearRect(0, 0, width, height);

        
       ctx.fillStyle = 'rgba(255, 252, 240, 0.8)';
        sand.forEach(p => {
            
            p.x += p.vx;
            p.y += p.vy + Math.sin(Date.now() * 0.001 + p.x) * 0.5; 

            
            if(p.x > width) p.x = 0;
            if(p.y > height) p.y = 0;
            if(p.y < 0) p.y = height;

            
            let dx = mouse.x - p.x;
            let dy = mouse.y - p.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            if(dist < 150) {
                p.x -= dx * 0.02;
                p.y -= dy * 0.02;
            }

            ctx.beginPath();
            ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
            ctx.fill();
        });

        
        
        trail.push({x: mouse.x, y: mouse.y});
        if(trail.length > trailLength) trail.shift();

        if(trail.length > 1) {
            ctx.beginPath();
            ctx.moveTo(trail[0].x, trail[0].y);
            
            for(let i = 1; i < trail.length - 1; i++) {
                
                let xc = (trail[i].x + trail[i+1].x) / 2;
                let yc = (trail[i].y + trail[i+1].y) / 2;
                ctx.quadraticCurveTo(trail[i].x, trail[i].y, xc, yc);
            }
            
            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ffffff';
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            
            
            for(let i = 1; i < trail.length; i++) {
                ctx.lineWidth = (i / trailLength) * 8; 
                ctx.stroke();
            }
            ctx.shadowBlur = 0; 
        }

        requestAnimationFrame(animate);
    }

    animate();
</script>

    <script>
        
        window.setHomeTheme = function(themeName) {
            let target = "/";
            if (themeName === 'sonic') target = "/themes/sonic/";
            if (themeName === 'flower') target = "/themes/flower/";
            if (themeName === 'smokey') target = "/themes/smokey/";
            if (themeName === 'popit') target = "/themes/popit/";
            if (themeName === 'bubble') target = "/themes/bubble/"; 
            if (themeName === 'cardboard') target = "/themes/cardboard/";

            localStorage.setItem("samurai_active_theme", target);
            console.log("Theme securely saved as: " + target);
        };

        
        (function() {
            const savedTheme = localStorage.getItem("samurai_active_theme");
            const currentPath = window.location.pathname;

            
            
            if (savedTheme && savedTheme !== "/" && (currentPath === "/" || currentPath === "/index.html") && !document.referrer.includes('/themes/')) {
                window.location.replace(savedTheme);
            }

            
            document.addEventListener("DOMContentLoaded", function() {
                const homeLink = document.getElementById("dynamic-home-link");
                const refreshBtn = document.getElementById("refresh-btn");

                
                if (savedTheme && homeLink) {
                    homeLink.href = savedTheme;
                }

                if (refreshBtn) {
                    refreshBtn.addEventListener("click", function(e) {
                        e.preventDefault();
                        window.location.reload();
                    });
                }
            });
        })();
