<style>
    .picker-container { 
        text-align: center; 
        padding: 80px 20px; 
        font-family: 'Impact', sans-serif; 
        background: #050505; 
        min-height: 100vh;
    }
    
    .picker-grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
        gap: 25px; 
        max-width: 1100px; 
        margin: 0 auto; 
    }
    
    .choice-btn { 
        display: block;
        padding: 40px 20px; 
        background: rgba(255,255,255,0.02); 
        border: 1px solid #333; 
        color: #fff; 
        text-decoration: none;
        position: relative;
        overflow: hidden;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
    }

     
    .btn-default:hover { border-color: #2fb98f; box-shadow: 0 0 20px rgba(47, 185, 143, 0.3); }
    .btn-sonic:hover { border-color: #0033cc; box-shadow: 0 0 20px rgba(0, 51, 204, 0.4); }
    .btn-flower:hover { border-color: #feb47b; box-shadow: 0 0 20px rgba(254, 180, 123, 0.4); }
    .btn-locked { opacity: 0.4; cursor: not-allowed; border-style: dashed; }

    .choice-btn:hover { transform: translateY(-8px); background: rgba(255,255,255,0.05); }
    
    .choice-title { font-size: 1.8rem; font-style: italic; margin-bottom: 5px; letter-spacing: 2px; text-transform: uppercase; }
    .choice-sub { font-family: monospace; font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 3px; }
    
    .status-tag { 
        position: absolute; top: 10px; right: 10px; 
        font-size: 0.6rem; padding: 2px 8px; border: 1px solid #444; color: #888;
    }
</style>

<div class="picker-container">
    <h1 style="letter-spacing: 8px; margin-bottom: 60px; color: #fff; opacity: 0.9;">SELECT INTERFACE</h1>
    
    <div class="picker-grid">
        <a href="/" class="choice-btn btn-default" onclick="setHomeTheme('arcade')">
            <div class="status-tag">STABLE</div>
            <div class="choice-title">CRT TERMINAL</div>
            <div class="choice-sub">SQUAD 12 TERMINAL</div>
        </a>

        <a href="/themes/sonic/" class="choice-btn btn-sonic" onclick="setHomeTheme('sonic')">
            <div class="status-tag">ACTIVE</div>
            <div class="choice-title">OVERDRIVE</div>
            <div class="choice-sub">CLICK TO PLAY</div>
        </a>

        <a href="/themes/flower/" class="choice-btn btn-flower" onclick="setHomeTheme('flower')">
            <div class="status-tag">ACTIVE</div>
            <div class="choice-title">NOVA DESIERTO DIASPORA</div>
            <div class="choice-sub">THE GOLDEN WIND</div>
        </a>

        <div class="choice-btn btn-locked">
            <div class="status-tag">ENCRYPTED</div>
            <div class="choice-title">SHINOBI</div>
            <div class="choice-sub">Hidden Leaf Archive</div>
        </div>
    </div>
</div>

    </main>

    <script>
        (function() {
            document.addEventListener("DOMContentLoaded", function() {
                const homeLink = document.getElementById("dynamic-home-link");
                const refreshBtn = document.getElementById("refresh-btn");
                const path = window.location.pathname;

                
                if (path.includes("sonic") || path.includes("flower")) {
                    localStorage.setItem("samurai_active_theme", path);
                } else if (path === "/" || path === "/index.html") {
                    
                    localStorage.setItem("samurai_active_theme", "/");
                }
                

                
                const saved = localStorage.getItem("samurai_active_theme");
                if (saved && homeLink) {
                    homeLink.href = saved;
                }

                
                if (refreshBtn) {
                    refreshBtn.addEventListener("click", function(e) {
                        e.preventDefault();
                        window.location.reload();
                    });
                }
            });
        })();
    </script>
