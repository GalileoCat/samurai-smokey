<style>
 
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@800&display=swap');

:root {

body, html {

.pod-dust {
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;

    background-size: 40px 40px;
    z-index: 0;
    pointer-events: none;
    animation: drift 20s linear infinite;
}
@keyframes drift { 
    from { background-position: 0 0; } 
    to { background-position: 100px 100px; } 
}

 
.popit-menu {
    position: relative;
    z-index: 10;
    max-width: 800px;

    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);

    padding: 30px;
    box-shadow:

        inset 0 0 20px rgba(255,255,255,0.2);
    animation: float 6s ease-in-out infinite;
}
@keyframes float {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-10px) rotate(0.5deg); }
}

 
.popit-header {
    background: rgba(0,0,0,0.2);
    border-radius: 20px;

}
.popit-title {

    font-size: 2.5rem;

    letter-spacing: 2px;
}

 
.popit-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 25px;
    padding: 10px;
}

 
.popit-item {
    position: relative;
    text-decoration: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    cursor: pointer;
}
.sticker-wrapper {
    position: relative;
    width: 140px;
    height: 140px;
    border-radius: 20px;

    overflow: hidden;
    box-shadow:

    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    background: #222;
}
.sticker-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 0.3s;
}

 
.popit-item:hover {
    transform: scale(1.15) rotate(-3deg);
    z-index: 20;
}
.popit-item:hover .sticker-wrapper {
    border-color: var(--accent);
    box-shadow: 0 15px 30px rgba(0,0,0,0.6), 0 0 20px var(--accent);
}
.popit-item:hover .sticker-wrapper img {

.sticker-label {

@media screen and (max-width: 768px) {

<script>

const colorBtn = document.getElementById('popit-color-btn');
const palette = document.getElementById('popit-palette');

colorBtn.addEventListener('click', () => {
    palette.style.display = palette.style.display === 'block' ? 'none' : 'block';
});

document.querySelectorAll('.color-swatch').forEach(swatch => {
    swatch.addEventListener('click', () => {
        const start = swatch.getAttribute('data-start');
        const end = swatch.getAttribute('data-end');

        document.documentElement.style.setProperty('--bg-start', start);
        document.documentElement.style.setProperty('--bg-end', end);

        
        colorBtn.style.transform = 'scale(0.85)';
        setTimeout(() => { colorBtn.style.transform = 'scale(1)'; }, 180);
    });
});


document.addEventListener('click', (e) => {
    if (!colorBtn.contains(e.target) && !palette.contains(e.target)) {
        palette.style.display = 'none';
    }
});
</script>



<script src="/js/theme-switcher.js"></script>

    <script>
        
        window.setHomeTheme = function(themeName) {
            let target = "/";
            if (themeName === 'sonic') target = "/themes/sonic/";
            if (themeName === 'flower') target = "/themes/flower/";
            if (themeName === 'smokey') target = "/themes/smokey/";
            if (themeName === 'popit') target = "/themes/popit/";
            if (themeName === 'bubble') target = "/themes/bubble/"; 
            if (themeName === 'cardboard') target = "/themes/cardboard/";

            localStorage.setItem("samurai_active_theme", target);
            console.log("Theme securely saved as: " + target);
        };

        
        (function() {
            const savedTheme = localStorage.getItem("samurai_active_theme");
            const currentPath = window.location.pathname;

            
            
            if (savedTheme && savedTheme !== "/" && (currentPath === "/" || currentPath === "/index.html") && !document.referrer.includes('/themes/')) {
                window.location.replace(savedTheme);
            }

            
            document.addEventListener("DOMContentLoaded", function() {
                const homeLink = document.getElementById("dynamic-home-link");
                const refreshBtn = document.getElementById("refresh-btn");

                
                if (savedTheme && homeLink) {
                    homeLink.href = savedTheme;
                }

                if (refreshBtn) {
                    refreshBtn.addEventListener("click", function(e) {
                        e.preventDefault();
                        window.location.reload();
                    });
                }
            });
        })();
    </script>
