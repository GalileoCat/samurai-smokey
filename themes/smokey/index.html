<script>
    const canvas = document.getElementById('ember-canvas');
    if (canvas) {
        const ctx = canvas.getContext('2d');
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const embers = [];
        class Ember {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + Math.random() * 100;
                this.size = Math.random() * 3 + 1;
                this.speedY = Math.random() * 1.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 1;
                this.opacity = Math.random() * 0.8 + 0.2;
                this.life = Math.random() * 100;
            }
            update() {
                this.y -= this.speedY;
                this.x += Math.sin(this.life / 20) * this.speedX;
                this.life++;
                this.opacity -= 0.002;
                if (this.y < 0 || this.opacity <= 0) {
                    this.y = canvas.height + 10;
                    this.x = Math.random() * canvas.width;
                    this.opacity = Math.random() * 0.8 + 0.2;
                }
            }
           draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                
                ctx.fillStyle = `rgba(255, 215, 0, ${this.opacity})`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = "#ffb300"; 
                ctx.fill();
            }
        }

        for (let i = 0; i < 60; i++) embers.push(new Ember());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            embers.forEach(ember => { ember.update(); ember.draw(); });
            requestAnimationFrame(animate);
        }
        animate();
    }
</script>

    <script>
        
        window.setHomeTheme = function(themeName) {
            let target = "/";
            if (themeName === 'sonic') target = "/themes/sonic/";
            if (themeName === 'flower') target = "/themes/flower/";
            if (themeName === 'smokey') target = "/themes/smokey/";
            if (themeName === 'popit') target = "/themes/popit/";
            if (themeName === 'bubble') target = "/themes/bubble/"; 
            if (themeName === 'cardboard') target = "/themes/cardboard/";

            localStorage.setItem("samurai_active_theme", target);
            console.log("Theme securely saved as: " + target);
        };

        
        (function() {
            const savedTheme = localStorage.getItem("samurai_active_theme");
            const currentPath = window.location.pathname;

            
            
            if (savedTheme && savedTheme !== "/" && (currentPath === "/" || currentPath === "/index.html") && !document.referrer.includes('/themes/')) {
                window.location.replace(savedTheme);
            }

            
            document.addEventListener("DOMContentLoaded", function() {
                const homeLink = document.getElementById("dynamic-home-link");
                const refreshBtn = document.getElementById("refresh-btn");

                
                if (savedTheme && homeLink) {
                    homeLink.href = savedTheme;
                }

                if (refreshBtn) {
                    refreshBtn.addEventListener("click", function(e) {
                        e.preventDefault();
                        window.location.reload();
                    });
                }
            });
        })();
    </script>
