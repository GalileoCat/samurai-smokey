{{ define "main" }}
<style>
    /* Global Community Hub CSS */
    body, html {
        margin: 0; padding: 0; min-height: 100vh;
        /* Cinematic Background with soft character art */
        background-color: #000 !important;
        background-image: 
            linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.95)),
            url('/images/comicsicon/ss.png') !important;
        background-size: cover !important;
        background-position: center 20% !important;
        background-attachment: fixed !important;
        
        font-family: 'Courier New', Courier, monospace;
        color: #fff;
    }

    .community-viewport {
        max-width: 1000px;
        margin: 60px auto;
        padding: 50px 40px;
        /* FLOATING DATA-GLASS EFFECT */
        background: rgba(230, 25, 25, 0.03); /* Subtle Red tint */
        backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        
        /* Strong Glowing Border */
        border: 2px solid rgba(230, 25, 25, 0.6); 
        border-radius: 25px;
        
        /* Neon Glow Shadow */
        box-shadow: 
            0 0 30px rgba(230, 25, 25, 0.4),
            inset 0 0 15px rgba(230, 25, 25, 0.2);
        
        /* Load animation cascade */
        opacity: 0; animation: fade-glitch-in 0.8s ease-out forwards;
    }

    /* Kinetic Glitch-In Animation */
    @keyframes fade-glitch-in {
        0% { opacity: 0; transform: translateY(-20px) scale(0.98); filter: blur(5px); }
        80% { opacity: 1; transform: translateY(0) scale(1.01); filter: blur(0px); }
        90% { transform: scale(1.0); filter: hue-rotate(90deg); }
        100% { transform: scale(1); filter: hue-rotate(0deg); }
    }

    .community-header {
        text-align: center;
        border-bottom: 2px dashed rgba(230, 25, 25, 0.3);
        padding-bottom: 25px;
        margin-bottom: 50px;
        position: relative;
    }

    .community-title {
        font-family: 'Impact', sans-serif;
        font-size: 3.8rem;
        letter-spacing: 12px;
        color: #ffb300; /* Gold */
        text-transform: uppercase;
        margin: 0;
        
        /* Neon Pulse Animation */
        text-shadow: 0 0 10px rgba(255, 179, 0, 0.8);
        animation: neon-pulse 1.5s infinite alternate;
    }

    @keyframes neon-pulse {
        from { text-shadow: 0 0 10px rgba(255, 179, 0, 0.8); }
        to { text-shadow: 0 0 25px rgba(255, 179, 0, 1), 0 0 50px rgba(230, 25, 25, 0.6); }
    }

    .community-subtitle {
        color: #ccc;
        font-size: 1rem;
        letter-spacing: 4px;
        text-transform: uppercase;
        margin-top: 10px;
    }
    
    /* Dedicated Highlight for Anonymous Posting */
    .giscus-intro {
        text-align: center; color: #aaa; margin-bottom: 30px; font-size: 0.85rem;
        background: rgba(0,0,0,0.4); padding: 15px; border-radius: 10px;
        border: 1px solid #333;
    }
    .anon-tip { color: #ffb300; font-weight: bold; text-decoration: none; border-bottom: 1px dashed #ffb300; transition: 0.3s; }
    .anon-tip:hover { color: #fff; border-color: #fff; }

    /* CRITICAL FIX: Forces Giscus to center and fill the width */
    .giscus, .giscus-frame {
        width: 100% !important;
        margin: 0 auto;
    }

    .giscus-container {
        width: 100%;
        min-height: 400px;
    }
</style>

<div class="community-viewport">
    <div class="community-header">
        <h1 class="community-title">COMMUNITY LOGS</h1>
        <div class="community-subtitle">Status: Active</div>
    </div>
    
    <div class="giscus-intro">
        [ LOGGED MESSAGES WILL BE ARCHIVED TO GITHUB DISCUSSIONS. ]<br>
        NOTE: <a href="https://github.com/GalileoCat/samurai-smokey/discussions/categories/general" target="_blank" class="anon-tip">Post in "Guest Logs"</a> if you wish to remain an <span style="color:#d32f2f">Anonymous.</span>
    </div>

    <div class="giscus-container">
        <script src="https://giscus.app/client.js"
                data-repo="GalileoCat/samurai-smokey"
                data-repo-id="R_kgDOSAR3ug"
                data-category="General"
                data-category-id="DIC_kwDOSAR3us4C8v2D"
                data-mapping="pathname"
                data-strict="0"
                data-reactions-enabled="1"
                data-emit-metadata="0"
                data-input-position="bottom"
                data-theme="dark"
                data-lang="en"
                crossorigin="anonymous"
                async>
        </script>
    </div>
</div>
{{ end }}
