{{ define "main" }}
<style>
    /* Global Community Hub CSS */
    body, html {
        margin: 0; padding: 0; min-height: 100vh;
        background: radial-gradient(circle at center, #111 0%, #000 100%);
        font-family: 'Courier New', Courier, monospace;
        color: #fff;
    }

    .community-viewport {
        max-width: 900px;
        margin: 80px auto;
        padding: 40px;
        background: rgba(20, 20, 20, 0.8);
        border: 1px solid #333;
        border-radius: 10px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.02);
        backdrop-filter: blur(10px);
    }

    .community-header {
        text-align: center;
        border-bottom: 2px dashed #444;
        padding-bottom: 20px;
        margin-bottom: 40px;
    }

    .community-title {
        font-family: 'Impact', sans-serif;
        font-size: 3rem;
        letter-spacing: 8px;
        color: #fff;
        text-shadow: 0 0 15px rgba(255,255,255,0.2);
        margin: 0 0 10px 0;
    }

    .community-subtitle {
        color: #888;
        font-size: 0.9rem;
        letter-spacing: 3px;
        text-transform: uppercase;
    }
</style>

<div class="community-viewport">
    <div class="community-header">
        <h1 class="community-title">COMMUNITY LOGS</h1>
        <div class="community-subtitle">Leave a message. Report a bug. Talk about the comic.</div>
    </div>

    <div class="giscus-container" style="min-height: 300px;">
        <script src="https://giscus.app/client.js"
                data-repo="GalileoCat/samurai-smokey"
                data-repo-id="R_kgDOSAR3ug"
                data-category="General"
                data-category-id="DIC_kwDOSAR3us4C8v2D"
                data-mapping="pathname"
                data-strict="0"
                data-reactions-enabled="1"
                data-emit-metadata="0"
                data-input-position="bottom"
                data-theme="dark"
                data-lang="en"
                crossorigin="anonymous"
                async>
        </script>
    </div>
</div>
{{ end }}
