{{ define "main" }}
<style>
    /* Home Container: Keeps everything centered and snappy */
    .home-container { 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        justify-content: flex-start; 
        padding-top: 10px; 
        font-family: sans-serif; 
    }

    /* Navigation Rows */
    .nav-row { 
        display: flex;
        justify-content: space-between;
        width: 320px; 
        margin: 10px 0; 
    }

    /* Top Row: Tight but not overlapping */
    .top-row { 
        width: 300px; 
        margin-bottom: -5px; 
        padding-right: 10px; 
        z-index: 2;
    }

    /* Main Icon */
    .home-icon { 
        max-width: 450px; 
        width: 100%; 
        height: auto; 
        margin: 0 auto;
    }

    /* THE ADJUSTMENT: Moved from -15px to 15px to push Gallery/Commissions down */
    .bottom-row {
        padding-left: 10px;
        margin-top: 15px !important; 
        margin-bottom: 25px; /* Added more space before Info/Credits */
    }

    .bottom-row a:first-child {
        margin-right: 20px; 
    }

    /* Link Typography */
    .nav-row a {
        font-weight: 900; 
        font-size: 1.4rem;
        text-transform: uppercase;
    }

    /* Sub-Nav: Pulls Info and Play links together */
    .sub-nav-links {
        margin-top: 5px;
        text-align: center;
    }

    .sub-nav-links a {
        display: block;
        margin-bottom: 8px;
    }
</style>

<div class="home-container">
    <div class="nav-row top-row">
        <a href="/comics/">Comics</a>
        <a href="/archive/">Archive</a>
    </div>

    <img src="/images/home-icon (2).png" alt="GalileoCat Home Icon" class="home-icon">

    <div class="nav-row bottom-row">
        <a href="/gallery/">Gallery</a>
        <a href="/commissions/">Commissions</a>
    </div>

    <div class="sub-nav-links">
        <a href="/info/" style="font-size: 0.8rem; opacity: 0.5; letter-spacing: 1px;">Info & Credits</a>
        <a href="/play/" style="font-size: 1rem; font-weight: bold;">Take a Break</a>
    </div>
</div>
{{ end }}
