{{ define "main" }}

<style>
/* ==========================================================
   ARCADE 'STAGE SELECT' HOME PAGE (SPLIT DESIGN)
   ========================================================== */
.arcade-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); /* Slightly wider for the split layout */
    gap: 30px;
    max-width: 1050px;
    margin: 40px auto;
    padding: 20px;
}

.arcade-card {
    position: relative;
    background: #0a0a0a;
    border: 2px solid #333;
    border-radius: 12px;
    text-decoration: none;
    overflow: hidden;
    transition: all 0.3s ease;
    display: flex;
    flex-direction: row; /* This creates the horizontal split! */
    align-items: stretch;
    min-height: 130px;
}

/* LEFT SIDE: The Image Container */
.arcade-icon-wrapper {
    width: 130px; /* Fixed width so text always has enough room */
    flex-shrink: 0;
    border-right: 2px solid #333;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s ease;
}

.arcade-icon-wrapper img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    filter: grayscale(100%) brightness(0.5); /* Dead/Offline state */
    transition: all 0.4s ease;
}

/* RIGHT SIDE: The Text Container */
.arcade-card-content {
    padding: 20px 25px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    text-align: left;
    position: relative;
    z-index: 2;
    flex-grow: 1;
}

/* CRT Scanline Overlay covers entire card */
.arcade-card::after {
    content: " ";
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.3) 50%);
    background-size: 100% 4px;
    z-index: 10;
    pointer-events: none;
    opacity: 0.4;
}

/* ==========================================
   THE NEON HOVER EFFECTS (Pro Color-Snap)
   ========================================== */
/* 1. Lift the card */
.arcade-card:hover { transform: translateY(-5px); }

/* 2. Snap image to full color & zoom slightly */
.arcade-card:hover .arcade-icon-wrapper img { filter: grayscale(0%) brightness(1); transform: scale(1.1); }

/* 3. Ignite Borders & Shadows based on category */
/* Comics: Smokey Red */
.arcade-card.comics:hover { border-color: #ff4d4d; box-shadow: 0 0 25px rgba(255, 77, 77, 0.5); }
.arcade-card.comics:hover .arcade-icon-wrapper { border-right-color: #ff4d4d; }

/* Archive: Food Cats Green */
.arcade-card.archive:hover { border-color: #2fb98f; box-shadow: 0 0 25px rgba(47, 185, 143, 0.5); }
.arcade-card.archive:hover .arcade-icon-wrapper { border-right-color: #2fb98f; }

/* Gallery: Cyan */
.arcade-card.gallery:hover { border-color: #00e5ff; box-shadow: 0 0 25px rgba(0, 229, 255, 0.5); }
.arcade-card.gallery:hover .arcade-icon-wrapper { border-right-color: #00e5ff; }

/* Commissions: Magenta */
.arcade-card.commission:hover { border-color: #ff00ff; box-shadow: 0 0 25px rgba(255, 0, 255, 0.5); }
.arcade-card.commission:hover .arcade-icon-wrapper { border-right-color: #ff00ff; }

/* Info: Amber */
.arcade-card.info:hover { border-color: #ffb300; box-shadow: 0 0 25px rgba(255, 179, 0, 0.5); }
.arcade-card.info:hover .arcade-icon-wrapper { border-right-color: #ffb300; }

/* Play: Lime */
.arcade-card.play:hover { border-color: #b3ff00; box-shadow: 0 0 25px rgba(179, 255, 0, 0.5); }
.arcade-card.play:hover .arcade-icon-wrapper { border-right-color: #b3ff00; }

/* Typography Formatting */
.arcade-title {
    color: #fff;
    font-family: monospace;
    font-size: 1.6rem;
    letter-spacing: 2px;
    margin: 0 0 5px 0;
    text-transform: uppercase;
}

.arcade-desc {
    color: #888;
    font-size: 0.85rem;
    margin: 0;
    font-style: italic;
    line-height: 1.3;
}

/* Blinking Text Animation */
@keyframes blink-cursor {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
}
.blinking-text {
    animation: blink-cursor 1.5s infinite;
}

/* ==========================================================
   MOBILE RESPONSIVE OVERRIDES (Arcade Menu)
   ========================================================== */
@media screen and (max-width: 768px) {
    /* 1. Shrink the main header */
    h1 { font-size: 2.2rem !important; }
    /* 2. Force single column and reduce gaps */
    .arcade-grid {
        grid-template-columns: 1fr; /* Forces 100% width */
        gap: 20px;
        padding: 10px;
        margin: 20px auto;
    }
    /* 3. Shrink the card height */
    .arcade-card {
        min-height: 100px;
    }
    /* 4. Shrink the image panel so text isn't squished */
    .arcade-icon-wrapper {
        width: 90px;
    }
    /* 5. Phones don't have "hover", so we make the images brighter by default */
    .arcade-icon-wrapper img {
        filter: grayscale(40%) brightness(0.8);
    }
    /* 6. Reduce text sizes and padding */
    .arcade-card-content {
        padding: 15px;
    }
    .arcade-title {
        font-size: 1.3rem;
        letter-spacing: 1px;
    }
    .arcade-desc {
        font-size: 0.8rem;
    }
    /* 7. Add a "Press" effect for touchscreens instead of a hover effect */
    .arcade-card:active {
        transform: scale(0.96);
    }
}

</style>
