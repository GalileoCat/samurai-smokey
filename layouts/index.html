<!DOCTYPE html>
<html lang="en">
<head>
    {{ $style := resources.Get "css/custom.css" | minify | fingerprint }}
<link rel="stylesheet" href="{{ $style.Permalink }}" integrity="{{ $style.Data.Integrity }}">
    <meta charset="UTF-8">
    <title>Samurai Smokey</title>
    <style>
    body { 
        background-color: #000; 
        color: #fff; 
        margin: 0; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        justify-content: center; 
        height: 100vh; 
        font-family: sans-serif; 
    }

    /* Shared row settings */
    .nav-row { 
        display: flex;
        justify-content: space-between;
        width: 320px; /* Width remains consistent to maintain symmetry */
        margin: 15px 0; 
    }

    /* Shifts the top buttons to the left */
    .top-row {
        padding-right: 10px; /* Pushes content from the right toward the left */
    }

    /* Shifts the bottom buttons to the right */
    .bottom-row {
        padding-left: 10px; /* Pushes content from the left toward the right */
    }

    .nav-row a {
        font-weight: 900; 
        font-size: 1.4rem;
        text-transform: uppercase;
        text-shadow: 1px 1px 0px #fff, -1px -1px 0px #fff, 0 0 5px rgba(255,255,255,0.4);
    }

    img { 
        max-width: 500px; 
        width: 100%; 
        height: auto; 
    }
    /* Add this to your <style> block in index.html */
/* 1. This spreads the links apart horizontally */
.bottom-row a:first-child {
    margin-right: 20px; 
}

/* 2. This pulls the ENTIRE row up toward the icon */
.bottom-row {
    margin-top: 10px !important; 
}
</style>

<body>
    <div class="nav-row top-row">
        <a href="/comics/">Chapters</a>
        <a href="/archive/">Archive</a>
    </div>

    <img src="/images/home-icon (2).png" alt="GalileoCat Home Icon">

    <div class="nav-row bottom-row">
    <a href="/gallery/">Gallery</a>
    <a href="/commissions/">Commissions</a>
</div>

    <div style="margin-top: 20px;">
        <a href="/info/" style="font-size: 0.8rem; opacity: 0.5; letter-spacing: 1px;">Info & Credits</a>
    </div>
    <div class="sub-nav">
    <div class="game-link">
        <a href="/play/">Take a Break</a>
    </div>
    </div>
</body>
