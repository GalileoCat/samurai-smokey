{{ define "main" }}
<div class="list-container">
    <nav class="sub-nav">
        </nav>
    
    <h1>{{ .Title }}</h1>

    <div class="category-content">
        {{ .Content }}
    </div>

    {{ if not .Content }}
    <ul class="clean-list">
        {{ range .Pages }}
            <li>
                <a href="{{ .Permalink }}" class="list-link">{{ .Title }}</a>
            </li>
        {{ end }}
    </ul>
    {{ end }}

    <div class="back-to-top-section">
        <hr class="fade-hr">
        <a href="#" class="top-button">↑ Back to Top</a>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/simplelightbox/2.14.0/simple-lightbox.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        new SimpleLightbox('.comic-grid a', { 
            overlayOpacity: 0.9, 
            history: false 
        });
    });
</script>
{{ end }}
