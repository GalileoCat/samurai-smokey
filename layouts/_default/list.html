{{ define "main" }}
<div class="list-container">
    <nav class="sub-nav">
    </nav>
    
    <h1>{{ .Title }}</h1>

    <div class="category-content">
        {{ .Content }}
    </div>

    {{ if not .Content }}
    <ul class="clean-list">
        {{ range .Pages }}
            <li>
                <a href="{{ .Permalink }}" class="list-link">{{ .Title }}</a>
            </li>
        {{ end }}
    </ul>
    {{ end }}

    {{ if eq .Params.enable_chat true }}
    <section id="arcade-list-chat" style="margin: 60px auto 40px auto; max-width: 800px; padding: 0 10px; text-align: center; clear: both; position: relative; z-index: 9999; box-sizing: border-box;">
        <hr style="border: 0; height: 1px; background-image: linear-gradient(to right, rgba(255,255,255,0), rgba(47, 185, 143, 0.4), rgba(255,255,255,0)); margin: 0 auto 40px auto;">
        
        <h3 style="font-family: monospace; color: #2fb98f; letter-spacing: 3px; border-bottom: 1px dashed #2fb98f; padding-bottom: 10px; margin-bottom: 20px; display: inline-block; text-transform: uppercase; font-size: 0.9rem; font-weight: normal;">
            [ INDEX_HUB // REGION_CHAT_CONNECTED ]
        </h3>
        
        <div style="background: rgba(10, 10, 10, 0.9); padding: 12px; border-radius: 12px; border: 2px solid #222; box-shadow: 0 0 20px rgba(47, 185, 143, 0.15); margin: 0 auto;">
            <iframe src="https://www3.cbox.ws/box/?boxid=3555243&boxtag=8KGelo" 
                    width="100%" 
                    height="450" 
                    allowtransparency="yes" 
                    allow="autoplay" 
                    frameborder="0" 
                    marginheight="0" 
                    marginwidth="0" 
                    scrolling="auto" 
                    style="border-radius: 8px; background: #000; display: block;">
            </iframe>
        </div>
    </section>
    {{ end }}

    <div class="back-to-top-section">
        <hr class="fade-hr">
        <a href="#" class="top-button">↑ Back to Top</a>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/simplelightbox/2.14.0/simple-lightbox.min.js"></script>
<script src="/js/gallery.js"></script>
{{ end }}
