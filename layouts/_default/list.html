{{ define "main" }}
<div class="list-container">
    <nav class="sub-nav">
    </nav>
    
    <h1>{{ .Title }}</h1>

    <div class="category-content">
        {{ .Content }}
    </div>

    {{ if not .Content }}
    <ul class="clean-list">
        {{ range .Pages }}
            <li>
                <a href="{{ .Permalink }}" class="list-link">{{ .Title }}</a>
            </li>
        {{ end }}
    </ul>
    {{ end }}

    <div class="giscus-section" style="margin-top: 50px;">
        <script src="https://giscus.app/client.js"
                data-repo="GalileoCat/samurai-smokey"
                data-repo-id="R_kgDOSAR3ug"
                data-category="General"
                data-category-id="DIC_kwDOSAR3us4C8v2D"
                data-mapping="pathname"
                data-strict="0"
                data-reactions-enabled="1"
                data-emit-metadata="0"
                data-input-position="bottom"
                data-theme="dark"
                data-lang="en"
                data-loading="lazy"
                crossorigin="anonymous"
                async>
        </script>
    </div>

    <div class="back-to-top-section">
        <hr class="fade-hr">
        <a href="#" class="top-button">↑ Back to Top</a>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/simplelightbox/2.14.0/simple-lightbox.min.js"></script>
<script src="/js/gallery.js"></script>
{{ end }}
