<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        (function() {
            const savedTheme = localStorage.getItem("samurai_active_theme");
            const currentPath = window.location.pathname;

            // Only redirect if at root and we have a saved theme that ISN'T root
            // Added a check to see if we just came from the theme picker to avoid loops
            if (savedTheme && savedTheme !== "/" && currentPath === "/" && !document.referrer.includes('/themes/')) {
                window.location.href = savedTheme;
            }
        })();
    </script>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    <link rel="icon" type="image/png" href="/icon.png">
    <link rel="apple-touch-icon" href="/icon.png">
    {{ if .Description }}
      <meta name="description" content="{{ .Description }}">
    {{ else }}
      <meta name="description" content="The official webcomic archive, gallery, and lore database for Samurai Smokey. Created by GalileoCat.">
    {{ end }}

    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: https://github.com https://*.githubusercontent.com https://giscus.app; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://giscus.app; script-src 'self' 'unsafe-inline' https://gc.zgo.at https://cdnjs.cloudflare.com https://giscus.app; frame-src 'self' https://giscus.app; connect-src 'self' https://galileocat.goatcounter.com https://giscus.app https://api.github.com; object-src 'none'; base-uri 'self'; upgrade-insecure-requests;">
    
    <meta name="referrer" content="no-referrer-when-downgrade">
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    
    {{ $style := resources.Get "css/custom.css" | minify | fingerprint }}
    <link rel="stylesheet" href="{{ $style.Permalink }}" integrity="{{ $style.Data.Integrity }}" media="screen">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/simplelightbox/2.14.0/simple-lightbox.min.css">
    <script data-goatcounter="https://galileocat.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
</head>
<body>
    <nav style="text-align: center; padding: 15px 0; position: relative; z-index: 9999;">
        <a href="/" id="dynamic-home-link" style="font-size: 0.8rem; opacity: 0.6; letter-spacing: 2px; text-decoration: none; color: inherit;">HOME</a>
        <span style="opacity: 0.2; margin: 0 10px;">|</span>
        <a href="#" id="refresh-btn" style="font-size: 0.8rem; opacity: 0.6; letter-spacing: 2px; text-decoration: none; color: inherit;">REFRESH SITE</a>
        <span style="opacity: 0.2; margin: 0 10px;">|</span>
        <a href="/comments/" style="color: #ffb300; text-decoration: none; font-weight: bold; letter-spacing: 2px; text-shadow: 0 0 10px rgba(255,179,0,0.5);">COMMUNITY LOGS</a>
    </nav>

    <main>
        {{ block "main" . }}{{ end }}
    </main>

    <script>
        // 1. THE SAVER: Only runs when a user clicks a button on the Theme Picker
        window.setHomeTheme = function(themeName) {
            let target = "/";
            if (themeName === 'sonic') target = "/themes/sonic/";
            if (themeName === 'flower') target = "/themes/flower/";
            if (themeName === 'smokey') target = "/themes/smokey/";
            if (themeName === 'popit') target = "/themes/popit/";
            if (themeName === 'bubble') target = "/themes/bubble/"; // <-- NEW LINE HERE
            if (themeName === 'ophelia') target = "/themes/ophelia/";

            localStorage.setItem("samurai_active_theme", target);
            console.log("Theme securely saved as: " + target);
        };

        // 2. THE ROUTER: Runs immediately to check memory
        (function() {
            const savedTheme = localStorage.getItem("samurai_active_theme");
            const currentPath = window.location.pathname;

            // If user goes to the main URL, teleport them to their saved theme!
            // (Uses .replace so it doesn't break their browser's "Back" button)
            if (savedTheme && savedTheme !== "/" && (currentPath === "/" || currentPath === "/index.html") && !document.referrer.includes('/themes/')) {
                window.location.replace(savedTheme);
            }

            // 3. THE UI UPDATER: Runs once the page loads to fix links
            document.addEventListener("DOMContentLoaded", function() {
                const homeLink = document.getElementById("dynamic-home-link");
                const refreshBtn = document.getElementById("refresh-btn");

                // Makes sure the "HOME" nav button takes them to their specific theme
                if (savedTheme && homeLink) {
                    homeLink.href = savedTheme;
                }

                if (refreshBtn) {
                    refreshBtn.addEventListener("click", function(e) {
                        e.preventDefault();
                        window.location.reload();
                    });
                }
            });
        })();
    </script>
</body>
</html>
