{{ define "main" }}
<style>
    .game-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin: 40px auto;
    }
    canvas {
        background-color: #050505;
        border: 2px solid #00e5ff;
        border-radius: 8px;
        box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
    }
    .score-board {
        color: #00e5ff;
        font-family: monospace;
        font-size: 2rem;
        margin-bottom: 15px;
        text-shadow: 0 0 10px rgba(0, 229, 255, 0.5);
    }
    /* Professional Gaming Shell */
canvas, .terminal-container, .clicker-container {
    position: relative;
    border: 1px solid rgba(255,255,255,0.1) !important;
    background: #000 !important;
    box-shadow: 0 0 40px rgba(0,0,0,1), 0 0 20px var(--glow-color) !important;
}

/* The Scanline Overlays */
.game-wrapper::after, .terminal-container::after, .clicker-container::after {
    content: " ";
    position: absolute;
    top: 0; left: 0; bottom: 0; right: 0;
    background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
    background-size: 100% 3px, 3px 100%;
    pointer-events: none;
    z-index: 100;
}

/* Screen Flicker effect */
@keyframes flicker {
    0% { opacity: 0.97; }
    5% { opacity: 0.95; }
    10% { opacity: 0.99; }
    100% { opacity: 1; }
}
canvas { animation: flicker 0.15s infinite; }
</style>

<div class="game-wrapper">
    <div class="score-board">
        SECTOR: <span id="score">1</span> | DATA: <span id="data-score" style="color: #ffb300;">0</span>
    </div>
    <canvas id="gameCanvas" width="800" height="400"></canvas>
    
    <div style="margin-top: 20px; text-align: center; color: #888; font-family: monospace;">
        <span style="color: #00e5ff;">[ARROW KEYS]</span> to move | <span style="color: #00e5ff;">[SPACE]</span> to jump<br><br>
        <a href="/play/" style="color: #aaa; text-decoration: none;">[ ESCAPE / RETURN TO ARCADE ]</a>
    </div>
</div>
</div>

{{ end }}
