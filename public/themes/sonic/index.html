:root {

body, html {

.retro-bg {
    position: fixed;
    top: -50%; left: -50%; width: 200%; height: 200%;
    background-color: var(--sega-blue);
    background-image: 
        linear-gradient(45deg, rgba(0,0,0,0.15) 25%, transparent 25%, transparent 75%, rgba(0,0,0,0.15) 75%, rgba(0,0,0,0.15)),

    background-size: 80px 80px;
    background-position: 0 0, 40px 40px;
    animation: pan-bg 15s linear infinite;
    z-index: 0;
}

@keyframes pan-bg {
    100% { background-position: 80px 80px, 120px 120px; }
}

 
.scanlines {
    position: fixed;
    top: 0; left: 0; width: 100vw; height: 100vh;
    background: repeating-linear-gradient(rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(0,0,0,0.2) 3px, rgba(0,0,0,0.2) 4px);
    z-index: 1; pointer-events: none;
}

 
.mega-menu-viewport {
    position: relative;
    z-index: 10;
    width: 100%;
    height: 90vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

 
.menu-header {
    background: var(--sonic-red);
    color: var(--highlight-yellow);
    padding: 10px 100px;
    font-size: 2.5rem;
    font-style: italic;
    border: 4px solid #fff;
    box-shadow: 5px 5px 0 #000;
    margin-bottom: 40px;
    text-transform: uppercase;
    letter-spacing: 2px;
    transform: skewX(-15deg);
}

.menu-header span {
    display: block;
    transform: skewX(15deg);  
    text-shadow: 2px 2px 0 #000;
}

 
.card-container {
    display: flex;
    width: 90%;
    max-width: 1200px;
    height: 55vh;
    gap: 10px;
}

.mega-card {
    flex: 1;
    position: relative;
    overflow: hidden;
    background: #000;
    border: 5px solid #fff;
     
    transform: skewX(-12deg);
    transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);  
    cursor: pointer;
    box-shadow: 8px 8px 0 rgba(0,0,0,0.6);
    text-decoration: none;
}

 
.card-image-wrapper {
    width: 140%;  
    height: 100%;
    transform: skewX(12deg) translateX(-15%);
    overflow: hidden;
    background: #111;
}

.card-image-wrapper img {
    width: 100%; height: 100%;
    object-fit: cover;
    filter: grayscale(100%) brightness(0.6) contrast(1.2);
    transition: all 0.2s ease;
}

 
.card-image-wrapper::after {
    content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background-image: radial-gradient(rgba(0,0,0,0.8) 2px, transparent 0);
    background-size: 8px 8px;
    transition: opacity 0.2s;
}

 
.card-title {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) skewX(12deg);  
    color: #fff;
    font-size: 2rem;
    font-style: italic;
    text-transform: uppercase;
    text-align: center;
    text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
    z-index: 10;
    transition: all 0.2s;
}

 
.mega-card:hover {
    flex: 2.5;  
    border-color: var(--highlight-yellow);
    box-shadow: 12px 12px 0 var(--highlight-orange);
    z-index: 20;
    transform: skewX(-12deg) translateY(-10px);  
}

.mega-card:hover .card-image-wrapper img {
    filter: grayscale(0%) brightness(1.1) contrast(1.1);
    transform: scale(1.05);
}

 
.mega-card:hover .card-image-wrapper::after { opacity: 0; }

.mega-card:hover .card-title {
    color: var(--highlight-yellow);
    font-size: 2.5rem;
    bottom: 30px;
    text-shadow: 4px 4px 0 var(--sonic-red), 0 0 10px #000;
}
 
.card-container {

.mega-card {

.mega-card:hover {

.card-title {

    white-space: nowrap;
}

}

    <script>
        
        window.setHomeTheme = function(themeName) {
            let target = "/";
            if (themeName === 'sonic') target = "/themes/sonic/";
            if (themeName === 'flower') target = "/themes/flower/";
            if (themeName === 'smokey') target = "/themes/smokey/";
            if (themeName === 'popit') target = "/themes/popit/";
            if (themeName === 'bubble') target = "/themes/bubble/"; 
            if (themeName === 'cardboard') target = "/themes/cardboard/";

            localStorage.setItem("samurai_active_theme", target);
            console.log("Theme securely saved as: " + target);
        };

        
        (function() {
            const savedTheme = localStorage.getItem("samurai_active_theme");
            const currentPath = window.location.pathname;

            
            
            if (savedTheme && savedTheme !== "/" && (currentPath === "/" || currentPath === "/index.html") && !document.referrer.includes('/themes/')) {
                window.location.replace(savedTheme);
            }

            
            document.addEventListener("DOMContentLoaded", function() {
                const homeLink = document.getElementById("dynamic-home-link");
                const refreshBtn = document.getElementById("refresh-btn");

                
                if (savedTheme && homeLink) {
                    homeLink.href = savedTheme;
                }

                if (refreshBtn) {
                    refreshBtn.addEventListener("click", function(e) {
                        e.preventDefault();
                        window.location.reload();
                    });
                }
            });
        })();
    </script>
