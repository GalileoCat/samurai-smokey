<style>
 
@import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@700&display=swap');

:root {
     
    --bubble-bg-top: #0a192f;
    --bubble-bg-bottom: #20b2aa;
}

body, html {
    margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden;
    background: linear-gradient(135deg, var(--bubble-bg-top), var(--bubble-bg-bottom)) !important;
    font-family: 'Quicksand', sans-serif;
    transition: background 0.8s ease;
}

 
.ambient-bubbles {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 0;
    pointer-events: none;
}

.ambient-bubble {
    position: absolute;
    bottom: -100px;
    background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.05));
    border-radius: 50%;
    box-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
     
    filter: blur(1px);
    animation: rise-and-sway 20s infinite ease-in;
}

 
.ambient-bubble:nth-child(1) { width: 40px; height: 40px; left: 10%; animation-duration: 18s; filter: blur(1px); }
.ambient-bubble:nth-child(2) { width: 90px; height: 90px; left: 35%; animation-duration: 25s; animation-delay: 2s; filter: blur(4px); opacity: 0.5; }
.ambient-bubble:nth-child(3) { width: 25px; height: 25px; left: 60%; animation-duration: 15s; animation-delay: 7s; filter: blur(0px); }
.ambient-bubble:nth-child(4) { width: 60px; height: 60px; left: 85%; animation-duration: 22s; animation-delay: 4s; filter: blur(2px); }
 
.ambient-bubble:nth-child(5) { width: 120px; height: 120px; left: 15%; animation-duration: 30s; animation-delay: 10s; filter: blur(6px); opacity: 0.3; }

@keyframes rise-and-sway {
    0% {
        transform: translateY(0) translateX(0) scale(1);
        opacity: 0;
    }
    10% {
        opacity: 0.8;
    }
    50% {
         
        transform: translateY(-60vh) translateX(50px) scale(1.1);
    }
    100% {
        transform: translateY(-120vh) translateX(-20px) scale(1.2);
        opacity: 0;
    }
}

.bubble-viewport {
    position: relative; z-index: 10; max-width: 900px; margin: 60px auto;
    display: flex; flex-wrap: wrap; justify-content: center; gap: 40px; padding: 20px;
}

.bubble-title { width: 100%; text-align: center; margin-bottom: 20px; }
.bubble-title h1 {
    color: #fff; font-size: 4rem; letter-spacing: 5px; text-shadow: 0 5px 15px rgba(0,0,0,0.3);
    margin: 0; font-weight: 700;
}

 
.bubble-tray {
    width: 100%; display: flex; justify-content: center; gap: 15px; margin-bottom: 40px;
}
.bubble-swatch {
    width: 30px; height: 30px; border-radius: 50%; cursor: pointer;
    border: 2px solid rgba(255,255,255,0.6); box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    transition: transform 0.3s, border-color 0.3s;
}
.bubble-swatch:hover { transform: scale(1.3); border-color: #fff; }

 
.bubble-item {
    position: relative; width: 180px; height: 180px; border-radius: 50%;
    text-decoration: none; display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    border: 2px solid rgba(255, 255, 255, 0.3);
    box-shadow: inset 0 0 20px rgba(255,255,255,0.2), 0 15px 25px rgba(0,0,0,0.2);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
     
    animation: gentle-bob 4s infinite ease-in-out alternate;
}

 
.bubble-item:nth-child(2) { animation-delay: 0.5s; }
.bubble-item:nth-child(3) { animation-delay: 1.2s; }
.bubble-item:nth-child(4) { animation-delay: 0.8s; }
.bubble-item:nth-child(5) { animation-delay: 1.5s; }
.bubble-item:nth-child(6) { animation-delay: 0.3s; }

@keyframes gentle-bob {
    0% { transform: translateY(0px); }
    100% { transform: translateY(-15px); }
}

 
.bubble-img-wrapper {
    width: 100px; height: 100px; border-radius: 50%; overflow: hidden;
    margin-bottom: 10px; border: 2px solid rgba(255,255,255,0.5);
    box-shadow: 0 5px 10px rgba(0,0,0,0.3);
}
.bubble-img-wrapper img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s; }

 
.bubble-label {
    color: #fff; font-size: 1.2rem; text-shadow: 0 2px 5px rgba(0,0,0,0.5); font-weight: bold;
}

 
.bubble-item:hover {
    background: rgba(255, 255, 255, 0.2); border-color: rgba(255,255,255,0.8);
    box-shadow: inset 0 0 30px rgba(255,255,255,0.5), 0 20px 40px rgba(0,0,0,0.4);
     
    animation-play-state: paused; transform: scale(1.15) translateY(-10px); z-index: 20;
}
.bubble-item:hover .bubble-img-wrapper img { transform: scale(1.15); }

 
.bubble-item::after {
    content: ''; position: absolute; top: 5%; left: 15%; width: 40%; height: 30%;
    border-radius: 50%; background: linear-gradient(180deg, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 100%);
    transform: rotate(-30deg); pointer-events: none;
}
</style>

<script>
    function updateBubbleTheme(topHex, bottomHex) {
        document.documentElement.style.setProperty('--bubble-bg-top', topHex);
        document.documentElement.style.setProperty('--bubble-bg-bottom', bottomHex);
        localStorage.setItem('bubble_bg_top', topHex);
        localStorage.setItem('bubble_bg_bottom', bottomHex);
    }

    (function() {
        const savedTop = localStorage.getItem('bubble_bg_top');
        const savedBottom = localStorage.getItem('bubble_bg_bottom');
        if (savedTop && savedBottom) {
            document.documentElement.style.setProperty('--bubble-bg-top', savedTop);
            document.documentElement.style.setProperty('--bubble-bg-bottom', savedBottom);
        }
    })();
</script>

    <script>
        
        window.setHomeTheme = function(themeName) {
            let target = "/";
            if (themeName === 'sonic') target = "/themes/sonic/";
            if (themeName === 'flower') target = "/themes/flower/";
            if (themeName === 'smokey') target = "/themes/smokey/";
            if (themeName === 'popit') target = "/themes/popit/";
            if (themeName === 'bubble') target = "/themes/bubble/"; 
            if (themeName === 'cardboard') target = "/themes/cardboard/";

            localStorage.setItem("samurai_active_theme", target);
            console.log("Theme securely saved as: " + target);
        };

        
        (function() {
            const savedTheme = localStorage.getItem("samurai_active_theme");
            const currentPath = window.location.pathname;

            
            
            if (savedTheme && savedTheme !== "/" && (currentPath === "/" || currentPath === "/index.html") && !document.referrer.includes('/themes/')) {
                window.location.replace(savedTheme);
            }

            
            document.addEventListener("DOMContentLoaded", function() {
                const homeLink = document.getElementById("dynamic-home-link");
                const refreshBtn = document.getElementById("refresh-btn");

                
                if (savedTheme && homeLink) {
                    homeLink.href = savedTheme;
                }

                if (refreshBtn) {
                    refreshBtn.addEventListener("click", function(e) {
                        e.preventDefault();
                        window.location.reload();
                    });
                }
            });
        })();
    </script>
