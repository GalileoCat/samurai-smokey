<style>
 
.ophelia-viewport {
    position: fixed !important;
    top: 0 !important; left: 0 !important; 
    width: 100vw !important; height: 100vh !important;
     
    background: radial-gradient(circle at 75% 50%, #1a0b2e 0%, #05020a 100%) !important;
    overflow: hidden !important;
    z-index: 9998 !important;
    font-family: 'Georgia', serif;
}

 
.character-art {
    position: absolute;
    right: 5%;
    top: 50%; 
    transform: translateY(-50%);
    width: 55vw;
    height: 100vh;
     
    background-image: url('/images/ophelia.png'); 
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center center;
    
     
    opacity: 1.0;
    
     
    mix-blend-mode: screen; 
    
     
    -webkit-mask-image: radial-gradient(ellipse at center, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 70%);
    mask-image: radial-gradient(ellipse at center, rgba(0,0,0,1) 30%, rgba(0,0,0,0) 70%);
    
    z-index: 1;  
    pointer-events: none;
    
     
    animation: opaque-breathe 12s infinite ease-in-out;
}

 
@keyframes opaque-breathe {
    0%, 100% { transform: translateY(-50%) scale(1); opacity: 1.0; }  
    50% { transform: translateY(-52%) scale(1.02); opacity: 0.95; }  
}

 
.ophelia-panel {
    position: absolute;
    left: 12%;
    top: 50%;
    transform: translateY(-50%);
    width: 350px;
    padding: 50px 40px;
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 182, 193, 0.15);
    border-radius: 20px;
    backdrop-filter: blur(15px);
    z-index: 10;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}

.ophelia-name {
    font-size: 3.5rem;
    font-style: italic;
    color: #ffb6c1;  
    margin: 0 0 5px 0;
    text-shadow: 0 0 20px rgba(255, 182, 193, 0.4);
    letter-spacing: 2px;
}

.ophelia-role {
    font-size: 0.85rem;
    text-transform: uppercase;
    color: #a980c0;
    letter-spacing: 5px;
    margin-bottom: 40px;
}

 
.ophelia-nav {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.o-link {
    position: relative;  
    text-decoration: none;
    color: #ddd;
    font-size: 1.1rem;
    padding: 15px 20px;
    border-left: 2px solid transparent;
    transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    background: linear-gradient(90deg, rgba(255,255,255,0.03) 0%, transparent 100%);
}

 
.o-link::before {
    content: '';
    position: absolute;
    left: 0px;
    top: 50%;
    margin-top: -7px;
    width: 14px;
    height: 14px;
    background: #ffb6c1;
    border-radius: 70% 0 70% 50%;  
    opacity: 0;
    transform: rotate(0deg) scale(0);
    transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    box-shadow: inset 1px 1px 3px rgba(255,255,255,0.5);
    pointer-events: none;
}

.o-link:hover {
    color: #fff;
    border-left: 2px solid #ffb6c1;
    background: linear-gradient(90deg, rgba(255, 182, 193, 0.15) 0%, transparent 100%);
    transform: translateX(10px);
    padding-left: 38px;  
    text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
}

.o-link:hover::before {
    opacity: 1;
    left: 12px;  
    transform: rotate(135deg) scale(1);  
}

 
.particle {
    position: absolute;
    background: #ffb6c1;
     
    border-radius: 70% 0 70% 50%;
    pointer-events: none;
    opacity: 0;
    z-index: 4;
    filter: blur(1px);
    box-shadow: inset 2px 2px 4px rgba(255,255,255,0.3);  
}

 
.wind-gust {
    position: absolute;
    height: 2px;
     
    background: linear-gradient(90deg, transparent, rgba(255, 182, 193, 0.2), transparent);
    border-radius: 50%;
    pointer-events: none;
    z-index: 3;
    filter: blur(3px);  
}
</style>

<script>
    const bg = document.getElementById('ophelia-bg');

    
    const particleCount = 35; 

    for(let i = 0; i < particleCount; i++) {
        let p = document.createElement('div');
        p.className = 'particle';
        
        let size = Math.random() * 8 + 6; 
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        
        
        p.style.left = (Math.random() * 150 - 50) + 'vw';
        p.style.top = (Math.random() * 120 - 20) + 'vh'; 
        
        let duration = Math.random() * 8 + 6; 
        let delay = Math.random() * 10;
        
        
        let driftX = Math.random() * 600 + 300; 
        let driftY = Math.random() * 200 + 100; 
        let rotations = Math.random() * 720 - 360; 
        
        p.animate([
            { transform: 'translate(0, 0) rotate(0deg)', opacity: 0 },
            { opacity: 0.8, offset: 0.1 },
            { opacity: 0.6, offset: 0.8 },
            { transform: `translate(${driftX}px, ${driftY}px) rotate(${rotations}deg)`, opacity: 0 }
        ], {
            duration: duration * 1000,
            delay: delay * 1000,
            iterations: Infinity,
            easing: 'linear'
        });
        
        bg.appendChild(p);
    }

    
    function spawnWind() {
        let w = document.createElement('div');
        w.className = 'wind-gust';
        
        
        w.style.width = (Math.random() * 40 + 20) + 'vw';
        w.style.top = (Math.random() * 100) + 'vh';
        w.style.left = '-50vw'; 
        
        let duration = Math.random() * 3 + 2; 
        
        w.animate([
            { transform: 'translateX(0)', opacity: 0 },
            { opacity: 1, offset: 0.5 },
            { transform: 'translateX(180vw)', opacity: 0 } 
        ], {
            duration: duration * 1000,
            easing: 'ease-in-out'
        });
        
        bg.appendChild(w);
        
        
        setTimeout(() => w.remove(), duration * 1000);
    }

    
    setInterval(spawnWind, Math.random() * 2000 + 1000);
</script>

    <script>
        
        window.setHomeTheme = function(themeName) {
            let target = "/";
            if (themeName === 'sonic') target = "/themes/sonic/";
            if (themeName === 'flower') target = "/themes/flower/";
            if (themeName === 'smokey') target = "/themes/smokey/";
            if (themeName === 'popit') target = "/themes/popit/";
            if (themeName === 'bubble') target = "/themes/bubble/"; 
            if (themeName === 'ophelia') target = "/themes/ophelia/";

            localStorage.setItem("samurai_active_theme", target);
            console.log("Theme securely saved as: " + target);
        };

        
        (function() {
            const savedTheme = localStorage.getItem("samurai_active_theme");
            const currentPath = window.location.pathname;

            
            
            if (savedTheme && savedTheme !== "/" && (currentPath === "/" || currentPath === "/index.html") && !document.referrer.includes('/themes/')) {
                window.location.replace(savedTheme);
            }

            
            document.addEventListener("DOMContentLoaded", function() {
                const homeLink = document.getElementById("dynamic-home-link");
                const refreshBtn = document.getElementById("refresh-btn");

                
                if (savedTheme && homeLink) {
                    homeLink.href = savedTheme;
                }

                if (refreshBtn) {
                    refreshBtn.addEventListener("click", function(e) {
                        e.preventDefault();
                        window.location.reload();
                    });
                }
            });
        })();
    </script>
